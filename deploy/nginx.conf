# Serves the built SPA and reverse-proxies the API on the same origin, so the
# frontend's relative /api calls and cookie auth stay same-site. Uploads go
# straight to GCS (signed URLs), not through here.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Edge hardening — covers the "no helmet / no security headers" audit gap.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    client_max_body_size 50m;

    # Docker's embedded DNS. Combined with the $upstream variable below, this
    # lets nginx start even when the api container is momentarily absent
    # (resolving per-request instead of pinning at boot → no crash-loop).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $upstream http://api:8080;
        proxy_pass $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # SPA fallback: unknown paths return index.html so client routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
