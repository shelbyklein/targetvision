# Vispix production stack — single box, cheapest path.
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
#
# Only web (8083) and mcp (8086) are published, and only to 127.0.0.1, so the
# Cloudflare tunnel on the host reaches them but the public LAN cannot. Postgres
# and the API are internal to the compose network only.
name: vispix

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: [.env.production]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vispix -d vispix"]
      interval: 5s
      timeout: 5s
      retries: 12
    # No ports: reachable only inside the compose network.

  # One-shot: applies pending Drizzle migrations, then exits. api/mcp wait for it.
  migrate:
    image: vispix-app:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: app
    command: ["node", "--import", "tsx", "lib/db/src/migrate.ts"]
    env_file: [.env.production]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: vispix-app:latest
    restart: unless-stopped
    command: ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]
    env_file: [.env.production]
    volumes:
      # Real-GCS service-account key, read-only. Path inside must match
      # GOOGLE_APPLICATION_CREDENTIALS in .env.production.
      - ./secrets/gcp-sa.json:/secrets/gcp-sa.json:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    # No ports: nginx (web) proxies to it over the compose network.

  mcp:
    image: vispix-app:latest
    restart: unless-stopped
    # Direct node+tsx invocation (mirrors the mcp-server start:http script);
    # avoids `pnpm run`, which is unreliable in this image. Env comes from the
    # container (env_file), so the script's --env-file flag isn't needed.
    command: ["node", "--import", "tsx", "artifacts/mcp-server/src/http.ts"]
    env_file: [.env.production]
    volumes:
      - ./secrets/gcp-sa.json:/secrets/gcp-sa.json:ro
    ports:
      - "127.0.0.1:8086:8086"
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    image: vispix-web:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:80"
    depends_on: [api]

volumes:
  postgres-data:
