components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      required: [id, clerkId, name, email, role, createdAt]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, member]
        createdAt:
          type: string
          format: date-time

    UserRoleUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, member]

    Album:
      type: object
      required: [id, ownerId, title, createdAt, photoCount]
      properties:
        id:
          type: integer
        ownerId:
          type: integer
        ownerName:
          type: ["string", "null"]
        title:
          type: string
        description:
          type: ["string", "null"]
        eventDate:
          type: ["string", "null"]
        coverPhotoId:
          type: ["integer", "null"]
        coverPhotoUrl:
          type: ["string", "null"]
        photoCount:
          type: integer
        hiddenCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    AlbumInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        eventDate:
          type: string

    AlbumUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        eventDate:
          type: ["string", "null"]

    AlbumCoverUpdate:
      type: object
      required: [photoId]
      properties:
        photoId:
          type: integer

    Photo:
      type: object
      required: [id, albumId, uploaderId, url, createdAt, ratingCount, isHidden]
      properties:
        id:
          type: integer
        albumId:
          type: integer
        albumTitle:
          type: ["string", "null"]
        uploaderId:
          type: integer
        storageKey:
          type: ["string", "null"]
        url:
          type: string
        takenAt:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        isHidden:
          type: boolean
        averageRating:
          type: ["number", "null"]
        ratingCount:
          type: integer
        myRating:
          type: ["integer", "null"]
        photoCollections:
          type: array
          items:
            $ref: "#/components/schemas/CollectionSummary"
        aiDescription:
          type: ["string", "null"]
        suggestedCollections:
          type: array
          items:
            $ref: "#/components/schemas/SuggestedCollection"
        ratings:
          type: array
          items:
            $ref: "#/components/schemas/PhotoRating"

    PhotoRating:
      type: object
      required: [userId, score, createdAt]
      properties:
        userId:
          type: integer
        score:
          type: integer
        createdAt:
          type: string
          format: date-time

    CollectionSummary:
      type: object
      required: [id, title, createdById, createdAt, photoCount]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        createdById:
          type: integer
        photoCount:
          type: integer
        coverPhotoId:
          type: ["integer", "null"]
        coverPhotoUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    Collection:
      type: object
      required: [id, title, createdById, createdAt, photoCount]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        createdById:
          type: integer
        photoCount:
          type: integer
        coverPhotoId:
          type: ["integer", "null"]
        coverPhotoUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        photos:
          type: array
          items:
            $ref: "#/components/schemas/Photo"

    CollectionInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string

    CollectionUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        coverPhotoId:
          type: ["integer", "null"]

    CollectionPhotoInput:
      type: object
      required: [photoId]
      properties:
        photoId:
          type: integer

    PhotoUpdate:
      type: object
      properties:
        aiDescription:
          type: ["string", "null"]
        takenAt:
          type: ["string", "null"]
        isHidden:
          type: boolean

    SuggestedCollection:
      type: object
      required: [id, title]
      properties:
        id:
          type: integer
        title:
          type: string

    SuggestedTag:
      type: object
      required: [name]
      properties:
        name:
          type: string

    SuggestedCategory:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    PhotoUploadInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
          minLength: 1
        storageKey:
          type: string
        takenAt:
          type: string

    PhotoTagInput:
      type: object
      required: [tagName]
      properties:
        tagName:
          type: string
          minLength: 1

    PhotoCategoryInput:
      type: object
      required: [categoryId]
      properties:
        categoryId:
          type: integer

    Tag:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    TagInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    TagCount:
      type: object
      required: [id, name, count]
      properties:
        id:
          type: integer
        name:
          type: string
        count:
          type: integer

    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    RatingInput:
      type: object
      required: [score]
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 5

    DashboardStats:
      type: object
      required: [totalAlbums, totalPhotos, totalUsers, totalTags, recentActivity]
      properties:
        totalAlbums:
          type: integer
        totalPhotos:
          type: integer
        totalUsers:
          type: integer
        totalTags:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/Photo"

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    RegistrationSettings:
      type: object
      required: [registrationEnabled]
      properties:
        registrationEnabled:
          type: boolean

    RegistrationSettingsUpdate:
      type: object
      required: [registrationEnabled]
      properties:
        registrationEnabled:
          type: boolean

    AiModelOption:
      type: object
      required: [id, label]
      properties:
        id:
          type: string
        label:
          type: string

    AiProviderInfo:
      type: object
      required: [id, label, model, availableModels, hasKey, replitFallbackAvailable, usable]
      properties:
        id:
          type: string
          enum: [openai, anthropic, gemini]
        label:
          type: string
        model:
          type: string
        availableModels:
          type: array
          items:
            $ref: "#/components/schemas/AiModelOption"
        hasKey:
          type: boolean
        keyPreview:
          type: ["string", "null"]
        replitFallbackAvailable:
          type: boolean
        usable:
          type: boolean

    AiSettings:
      type: object
      required: [enabled, activeProvider, providers, hasUsableActive]
      properties:
        enabled:
          type: boolean
        activeProvider:
          type: string
          enum: [openai, anthropic, gemini]
        hasUsableActive:
          type: boolean
        providers:
          type: object
          required: [openai, anthropic, gemini]
          properties:
            openai:
              $ref: "#/components/schemas/AiProviderInfo"
            anthropic:
              $ref: "#/components/schemas/AiProviderInfo"
            gemini:
              $ref: "#/components/schemas/AiProviderInfo"

    AiSettingsUpdate:
      type: object
      properties:
        enabled:
          type: boolean
        activeProvider:
          type: string
          enum: [openai, anthropic, gemini]
        providerModels:
          type: object
          properties:
            openai:
              type: string
            anthropic:
              type: string
            gemini:
              type: string

    AiProviderKeyInput:
      type: object
      required: [apiKey]
      properties:
        apiKey:
          type: string
          minLength: 4

    AcceptNewCollectionSuggestionBody:
      type: object
      properties:
        name:
          type: string

    BulkPhotoUpdate:
      type: object
      required: [ids, isHidden]
      properties:
        ids:
          type: array
          items:
            type: integer
          minItems: 1
        isHidden:
          type: boolean

    BulkPhotoUpdateResult:
      type: object
      required: [updated]
      properties:
        updated:
          type: integer

    BulkRetryAiAnalysisEventsResult:
      type: object
      required: [succeeded, skipped, failed]
      properties:
        succeeded:
          type: integer
        skipped:
          type: integer
        failed:
          type: integer

    AiAnalysisEvent:
      type: object
      required: [id, status, createdAt]
      properties:
        id:
          type: integer
        photoId:
          type: ["integer", "null"]
        photoCaption:
          type: ["string", "null"]
        photoThumbnailUrl:
          type: ["string", "null"]
        provider:
          type: ["string", "null"]
        status:
          type: string
          enum: [success, skipped, failed]
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
