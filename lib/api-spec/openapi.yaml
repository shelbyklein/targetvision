        coverPhotoId:
          type: ["integer", "null"]
        coverPhotoUrl:
          type: ["string", "null"]
        coverPhotoThumbnailKey:
          type: ["string", "null"]
        photoCount:
          type: integer
        ratedCount:
          type: integer
        hiddenCount:
          type: integer
        unratedCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    AlbumInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        eventDate:
          type: string

    AlbumUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        eventDate:
          type: ["string", "null"]

    AlbumCoverUpdate:
      type: object
      required: [photoId]
      properties:
        photoId:
          type: integer

    CollectionCoverUpdate:
      type: object
      required: [photoId]
      properties:
        photoId:
          type: integer

    DuplicatePhoto:
      type: object
      required: [id, albumId, createdAt, isAlbumCover, collectionCount]
      properties:
        id:
          type: integer
        albumId:
          type: integer
        albumTitle:
          type: ["string", "null"]
        filename:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        isAlbumCover:
          type: boolean
          description: True if this photo is the cover of its album; deleting it would clear the album cover.
        collectionCount:
          type: integer
          description: Number of collections this photo belongs to.

    DuplicatePhotoGroup:
      type: object
      required: [contentHash, photos]
      properties:
        contentHash:
          type: string
        photos:
          type: array
          items:
            $ref: "#/components/schemas/DuplicatePhoto"

    ListDuplicatePhotoGroupsResponse:
      type: object
      required: [groups, hasMore]
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/DuplicatePhotoGroup"
        hasMore:
          type: boolean
          description: True when more groups exist beyond this page.

    DuplicatesSummaryResponse:
      type: object
      required: [groupCount, extraCount]
      properties:
        groupCount:
          type: integer
          description: Number of duplicate groups (2+ byte-identical photos).
        extraCount:
          type: integer
          description: Deletable extra copies across all groups (keeping covers, else one per group).

    DeleteDuplicateExtrasResponse:
      type: object
      required: [deleted]
      properties:
        deleted:
          type: integer

    Photo:
      type: object
      required: [id, albumId, uploaderId, url, createdAt, ratingCount, isHidden]
      properties:
        id:
          type: integer
        albumId:
          type: integer
        albumTitle:
          type: ["string", "null"]
        uploaderId:
          type: integer
        storageKey:
          type: ["string", "null"]
        thumbnailKey:
          type: ["string", "null"]
        url:
          type: string
        filename:
          type: ["string", "null"]
        filesize:
          type: ["integer", "null"]
        width:
          type: ["integer", "null"]
          description: Display width in pixels (EXIF-orientation corrected). Null until captured on upload or backfilled.
        height:
          type: ["integer", "null"]
          description: Display height in pixels (EXIF-orientation corrected). Null until captured on upload or backfilled.
        contentHash:
          type: ["string", "null"]
          description: SHA-256 hex digest of the original image bytes, used for exact duplicate detection. Null until computed.
        takenAt:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        isHidden:
          type: boolean
        averageRating:
          type: ["number", "null"]
        ratingCount:
          type: integer
        myRating:
          type: ["integer", "null"]
        photoCollections:
          type: array
          items:
            $ref: "#/components/schemas/CollectionSummary"
        photoProjects:
          type: array
          description: Projects this photo currently belongs to (membership only).
          items:
            $ref: "#/components/schemas/PhotoProjectMembership"
        attributionTags:
          type: array
          description: Attribution / usage-rights tags this photo is cleared for.
          items:
            $ref: "#/components/schemas/AttributionTag"
        aiDescription:
          type: ["string", "null"]
        latestAiStatus:
          type: ["string", "null"]
          enum: ["success", "skipped", "failed", null]
          description: Status of the most recent AI analysis event for this photo
        suggestedCollections:
          type: array
          items:
            $ref: "#/components/schemas/SuggestedCollection"
        suggestedNewCollections:
          type: array
          items:
            $ref: "#/components/schemas/SuggestedNewCollection"
