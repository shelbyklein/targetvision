openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Team Photo Album API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: albums
    description: Album operations
  - name: photos
    description: Photo operations
  - name: tags
    description: Tag operations
  - name: categories
    description: Category operations
  - name: collections
    description: Collection operations
  - name: ratings
    description: Rating operations
  - name: stats
    description: Aggregation and statistics
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: admin
    description: Admin-only configuration endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update a user's role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /albums:
    get:
      operationId: listAlbums
      tags: [albums]
      summary: List all albums
      responses:
        "200":
          description: List of albums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Album"
    post:
      operationId: createAlbum
      tags: [albums]
      summary: Create a new album
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumInput"
      responses:
        "201":
          description: Created album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "401":
          description: Unauthorized

  /albums/{id}:
    get:
      operationId: getAlbum
      tags: [albums]
      summary: Get a single album by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Album details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "404":
          description: Not found
    patch:
      operationId: updateAlbum
      tags: [albums]
      summary: Update an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumUpdate"
      responses:
        "200":
          description: Updated album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteAlbum
      tags: [albums]
      summary: Delete an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /albums/{id}/top-rated:
    get:
      operationId: getAlbumTopRated
      tags: [photos]
      summary: Get top-rated photos in an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Top-rated photos in this album
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /albums/{id}/cover:
    patch:
      operationId: setAlbumCover
      tags: [albums]
      summary: Set the cover photo for an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumCoverUpdate"
      responses:
        "200":
          description: Updated album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /albums/{id}/photos:
    get:
      operationId: listAlbumPhotos
      tags: [photos]
      summary: List photos in an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: includeHidden
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of photos in album
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
    post:
      operationId: uploadPhoto
      tags: [photos]
      summary: Add a photo to an album (URL-based)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUploadInput"
      responses:
        "201":
          description: Created photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
        "404":
          description: Album not found

  /search:
    get:
      operationId: searchPhotos
      tags: [photos]
      summary: Search photos by keyword across caption, album title, and AI description
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: ratingMin
          in: query
          required: false
          schema:
            type: number
        - name: ratingMax
          in: query
          required: false
          schema:
            type: number
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
        - name: uploaderId
          in: query
          required: false
          schema:
            type: integer
        - name: includeHidden
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos:
    get:
      operationId: listPhotos
      tags: [photos]
      summary: List all photos with optional filters
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
        - name: ratingMin
          in: query
          required: false
          schema:
            type: number
        - name: ratingMax
          in: query
          required: false
          schema:
            type: number
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
        - name: uploaderId
          in: query
          required: false
          schema:
            type: integer
        - name: includeHidden
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"

  /photos/bulk:
    patch:
      operationId: bulkUpdatePhotos
      tags: [photos]
      summary: Bulk update photos (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkPhotoUpdate"
      responses:
        "200":
          description: Number of photos updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPhotoUpdateResult"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /photos/{id}:
    get:
      operationId: getPhoto
      tags: [photos]
      summary: Get a single photo by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photo details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "404":
          description: Not found
    patch:
      operationId: updatePhoto
      tags: [photos]
      summary: Update photo metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUpdate"
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    delete:
      operationId: deletePhoto
      tags: [photos]
      summary: Delete a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /photos/{id}/tags:
    post:
      operationId: addPhotoTag
      tags: [tags]
      summary: Add a tag to a photo (creates tag if needed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoTagInput"
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos/{id}/tags/{tagId}:
    delete:
      operationId: removePhotoTag
      tags: [tags]
      summary: Remove a tag from a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: tagId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos/{id}/categories:
    post:
      operationId: addPhotoCategory
      tags: [categories]
      summary: Add a category to a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoCategoryInput"
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos/{id}/categories/{categoryId}:
    delete:
      operationId: removePhotoCategory
      tags: [categories]
      summary: Remove a category from a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos/{id}/rating:
    post:
      operationId: ratePhoto
      tags: [ratings]
      summary: Rate a photo (1-5 stars)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingInput"
      responses:
        "200":
          description: Updated photo with new average rating
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
    delete:
      operationId: clearPhotoRating
      tags: [ratings]
      summary: Clear the current user's rating on a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated photo with rating removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
        "404":
          description: Photo not found

  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List all tags
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
    post:
      operationId: createTag
      tags: [tags]
      summary: Create a new tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagInput"
      responses:
        "201":
          description: Created tag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "401":
          description: Unauthorized

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /registration-settings:
    get:
      operationId: getRegistrationSettings
      tags: [admin]
      summary: Get registration settings (public)
      description: Returns whether public self-registration is currently enabled. No authentication required.
      responses:
        "200":
          description: Current registration settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationSettings"

  /admin/registration-settings:
    patch:
      operationId: updateRegistrationSettings
      tags: [admin]
      summary: Update registration settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationSettingsUpdate"
      responses:
        "200":
          description: Updated registration settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationSettings"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/ai-settings:
    get:
      operationId: getAiSettings
      tags: [admin]
      summary: Get AI provider settings (admin only)
      responses:
        "200":
          description: Current AI settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSettings"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    patch:
      operationId: updateAiSettings
      tags: [admin]
      summary: Update AI enabled flag and active provider (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSettingsUpdate"
      responses:
        "200":
          description: Updated AI settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSettings"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/ai-settings/providers/{provider}/key:
    put:
      operationId: setAiProviderKey
      tags: [admin]
      summary: Save (or replace) the API key for a provider (admin only)
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [openai, anthropic, gemini]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiProviderKeyInput"
      responses:
        "200":
          description: Updated AI settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSettings"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    delete:
      operationId: clearAiProviderKey
      tags: [admin]
      summary: Clear the saved API key for a provider (admin only)
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [openai, anthropic, gemini]
      responses:
        "200":
          description: Updated AI settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSettings"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/ai-analysis-events:
    get:
      operationId: listAiAnalysisEvents
      tags: [admin]
      summary: List recent AI photo analysis events (admin only)
      responses:
        "200":
          description: Recent AI analysis events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiAnalysisEvent"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/ai-analysis-events/retry-all:
    post:
      operationId: bulkRetryAiAnalysisEvents
      tags: [admin]
      summary: Re-run AI analysis for all recently failed events (admin only)
      responses:
        "200":
          description: Bulk retry result summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRetryAiAnalysisEventsResult"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/ai-analysis-events/{id}/retry:
    post:
      operationId: retryAiAnalysisEvent
      tags: [admin]
      summary: Re-run AI analysis for the photo of a failed event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: New AI analysis event recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAnalysisEvent"
        "400":
          description: Event is not in a retryable state
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Event or its photo not found

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized

  /stats/recent-photos:
    get:
      operationId: getRecentPhotos
      tags: [stats]
      summary: Get recently uploaded photos across all albums
      responses:
        "200":
          description: Recent photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /stats/top-rated:
    get:
      operationId: getTopRatedPhotos
      tags: [stats]
      summary: Get top-rated photos across all albums
      responses:
        "200":
          description: Top rated photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
        '500':
          description: Failed to generate upload URL.

  /collections:
    get:
      operationId: listCollections
      tags: [collections]
      summary: List all collections
      responses:
        "200":
          description: List of collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CollectionSummary"
        "401":
          description: Unauthorized
    post:
      operationId: createCollection
      tags: [collections]
      summary: Create a new collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionInput"
      responses:
        "201":
          description: Created collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "401":
          description: Unauthorized

  /collections/{id}:
    get:
      operationId: getCollection
      tags: [collections]
      summary: Get a single collection with its photos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Collection with photos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "404":
          description: Not found
    patch:
      operationId: updateCollection
      tags: [collections]
      summary: Update a collection (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionUpdate"
      responses:
        "200":
          description: Updated collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteCollection
      tags: [collections]
      summary: Delete a collection (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /collections/{id}/photos:
    post:
      operationId: addPhotoToCollection
      tags: [collections]
      summary: Add a photo to a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionPhotoInput"
      responses:
        "204":
          description: Added
        "401":
          description: Unauthorized
        "404":
          description: Not found

