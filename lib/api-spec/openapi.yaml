  /stats/tag-cloud:
    get:
      operationId: getTagCloud
      tags: [stats]
      summary: Get tag usage counts for tag cloud display
      responses:
        "200":
          description: Tag cloud data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TagCount"
        "401":
          description: Unauthorized

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      required: [id, authUserId, name, email, role, createdAt]
      properties:
        id:
          type: integer
        authUserId:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, member]
        createdAt:
          type: string
          format: date-time
        navOrder:
          type: ["array", "null"]
          items:
            type: string
          description: Preferred sidebar nav order (nav hrefs). Null = default order.

    NavOrderUpdate:
      type: object
      required: [navOrder]
      properties:
        navOrder:
          type: array
          items:
            type: string
          description: Nav hrefs in the user's preferred order.

    UserRoleUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, member]

    ReorderBody:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          description: Entity ids in the desired display order (position = index).
          items:
            type: integer

    ReorderResult:
      type: object
      required: [updated]
      properties:
        updated:
          type: integer
          description: Number of rows whose sort position was set.

    Album:
