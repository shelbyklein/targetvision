openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Team Photo Album API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: albums
    description: Album operations
  - name: photos
    description: Photo operations
  - name: tags
    description: Tag operations
  - name: categories
    description: Category operations
  - name: collections
    description: Collection operations
  - name: projects
    description: Project operations (user-curated photo buckets)
  - name: ratings
    description: Rating operations
  - name: stats
    description: Aggregation and statistics
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: admin
    description: Admin-only configuration endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users/me/nav-order:
    patch:
      operationId: updateNavOrder
      tags: [users]
      summary: Save the current user's preferred sidebar nav order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NavOrderUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update a user's role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /albums:
    get:
      operationId: listAlbums
      tags: [albums]
      summary: List all albums
      responses:
        "200":
          description: List of albums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Album"
    post:
      operationId: createAlbum
      tags: [albums]
      summary: Create a new album
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumInput"
      responses:
        "201":
          description: Created album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "401":
          description: Unauthorized

  /albums/order:
    put:
      operationId: reorderAlbums
      tags: [albums]
      summary: Set the manual card order of albums
      description: Assigns sort positions from the given id order. Ids omitted from the list keep their relative order after the listed ones.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderBody"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReorderResult"
        "401":
          description: Unauthorized

  /albums/{id}:
    get:
      operationId: getAlbum
      tags: [albums]
      summary: Get a single album by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Album details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "404":
          description: Not found
    patch:
      operationId: updateAlbum
      tags: [albums]
      summary: Update an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumUpdate"
      responses:
        "200":
          description: Updated album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteAlbum
      tags: [albums]
      summary: Delete an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /albums/{id}/top-rated:
    get:
      operationId: getAlbumTopRated
      tags: [photos]
      summary: Get top-rated photos in an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Top-rated photos in this album
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /albums/{id}/cover:
    patch:
      operationId: setAlbumCover
      tags: [albums]
      summary: Set the cover photo for an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumCoverUpdate"
      responses:
        "200":
          description: Updated album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /albums/{id}/photos:
    get:
      operationId: listAlbumPhotos
      tags: [photos]
      summary: List photos in an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: includeHidden
          in: query
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
        - name: inCollection
          in: query
          required: false
          schema:
            type: boolean
        - name: hasRating
          in: query
          required: false
          schema:
            type: boolean
        - name: aiStatus
          in: query
          required: false
          schema:
            type: string
            enum: [has_description, failed, not_analysed]
        - name: attributionTagId
          in: query
          required: false
          schema:
            type: integer
          description: Only photos carrying this attribution tag.
        - name: hasAttribution
          in: query
          required: false
          schema:
            type: boolean
          description: true = photos with any attribution tag; false = untagged photos. Ignored when attributionTagId is set.
      responses:
        "200":
          description: Page of photos in album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAlbumPhotosPagedResponse"
    post:
      operationId: uploadPhoto
      tags: [photos]
      summary: Add a photo to an album (URL-based)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUploadInput"
      responses:
        "201":
          description: Created photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
        "404":
          description: Album not found

  /search:
    get:
      operationId: searchPhotos
      tags: [photos]
      summary: Search photos by keyword across caption, album title, and AI description
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: ratingMin
          in: query
          required: false
          schema:
            type: number
        - name: ratingMax
          in: query
          required: false
          schema:
            type: number
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
        - name: uploaderId
          in: query
          required: false
          schema:
            type: integer
        - name: includeHidden
          in: query
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
        - name: exclude
          in: query
          required: false
          description: Terms to exclude — photos whose AI description matches any are dropped.
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Search results (one page)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchPhotosPagedResponse"
        "401":
          description: Unauthorized

  /search/semantic:
    get:
      operationId: semanticSearchPhotos
      tags: [photos]
      summary: Semantic photo search — ranks photos by image-embedding similarity to the query text
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: topK
          in: query
          required: false
          schema:
            type: integer
        - name: includeHidden
          in: query
          required: false
          schema:
            type: boolean
        - name: exclude
          in: query
          required: false
          description: Concepts to steer away from — the query vector is pushed away from their embedding.
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Photos ranked by semantic similarity (most similar first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos/{id}/similar:
    get:
      operationId: listSimilarPhotos
      tags: [photos]
      summary: Photos most visually similar to the given photo (by image embedding)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: topK
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Similar photos, most similar first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /photos:
    get:
      operationId: listPhotos
      tags: [photos]
      summary: List all photos with optional filters
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
        - name: ratingMin
          in: query
          required: false
          schema:
            type: number
        - name: ratingMax
          in: query
          required: false
          schema:
            type: number
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
        - name: uploaderId
          in: query
          required: false
          schema:
            type: integer
        - name: includeHidden
          in: query
          required: false
          schema:
            type: boolean
        - name: albumId
          in: query
          required: false
          schema:
            type: integer
        - name: aiStatus
          in: query
          required: false
          schema:
            type: string
            enum: ["has_description", "failed", "not_analysed"]
        - name: attributionTagId
          in: query
          required: false
          schema:
            type: integer
          description: Only photos carrying this attribution tag.
        - name: hasAttribution
          in: query
          required: false
          schema:
            type: boolean
          description: true = photos with any attribution tag; false = untagged photos. Ignored when attributionTagId is set.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of photos (one page)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPhotosPagedResponse"

  /photos/bulk:
    patch:
      operationId: bulkUpdatePhotos
      tags: [photos]
      summary: Bulk update photos (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkPhotoUpdate"
      responses:
        "200":
          description: Number of photos updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPhotoUpdateResult"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    delete:
      operationId: bulkDeletePhotos
      tags: [photos]
      summary: Bulk delete photos (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkPhotoDelete"
      responses:
        "200":
          description: Number of photos deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPhotoDeleteResult"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /attribution-tags:
    get:
      operationId: listAttributionTags
      tags: [attribution]
      summary: List attribution / usage-rights tags
      responses:
        "200":
          description: All attribution tags, ordered by name
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttributionTag"
        "401":
          description: Unauthorized
    post:
      operationId: createAttributionTag
      tags: [attribution]
      summary: Create an attribution tag (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttributionTagInput"
      responses:
        "201":
          description: Created tag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributionTag"
        "400":
          description: Invalid name
        "409":
          description: Name already exists

  /attribution-tags/{id}:
    patch:
      operationId: updateAttributionTag
      tags: [attribution]
      summary: Rename an attribution tag (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttributionTagInput"
      responses:
        "200":
          description: Updated tag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributionTag"
        "404":
          description: Tag not found
    delete:
      operationId: deleteAttributionTag
      tags: [attribution]
      summary: Delete an attribution tag (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Tag not found

  /albums/{id}/attribution-tags:
    get:
      operationId: getAlbumAttributionSummary
      tags: [attribution]
      summary: Per-tag counts of how many of an album's photos carry each attribution tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Album attribution coverage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumAttributionSummary"
        "404":
          description: Album not found
    post:
      operationId: setAlbumAttribution
      tags: [attribution]
      summary: Add or remove one attribution tag on every photo in an album (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumAttributionUpdate"
      responses:
        "200":
          description: Number of photo-tag links changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkAttributionTagsResult"
        "404":
          description: Album or tag not found

  /photos/attribution-tags/bulk:
    post:
      operationId: bulkSetAttributionTags
      tags: [attribution]
      summary: Add or remove one attribution tag on many photos (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkAttributionTags"
      responses:
        "200":
          description: Number of photo-tag links changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkAttributionTagsResult"
        "404":
          description: Tag not found

  /photos/{id}/attribution-tags:
    post:
      operationId: addPhotoAttributionTag
      tags: [attribution]
      summary: Tag a photo with an attribution tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoAttributionTagInput"
      responses:
        "204":
          description: Tagged
        "404":
          description: Photo or tag not found

  /photos/{id}/attribution-tags/{tagId}:
    delete:
      operationId: removePhotoAttributionTag
      tags: [attribution]
      summary: Remove an attribution tag from a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: tagId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /photos/{id}:
    get:
      operationId: getPhoto
      tags: [photos]
      summary: Get a single photo by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photo details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "404":
          description: Not found
    patch:
      operationId: updatePhoto
      tags: [photos]
      summary: Update photo metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUpdate"
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    delete:
      operationId: deletePhoto
      tags: [photos]
      summary: Delete a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /photos/{id}/tags:
    post:
      operationId: addPhotoTag
      tags: [tags]
      summary: Add a tag to a photo (creates tag if needed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoTagInput"
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos/{id}/tags/{tagId}:
    delete:
      operationId: removePhotoTag
      tags: [tags]
      summary: Remove a tag from a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: tagId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos/{id}/categories:
    post:
      operationId: addPhotoCategory
      tags: [categories]
      summary: Add a category to a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoCategoryInput"
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos/{id}/categories/{categoryId}:
    delete:
      operationId: removePhotoCategory
      tags: [categories]
      summary: Remove a category from a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos/{id}/rating:
    post:
      operationId: ratePhoto
      tags: [ratings]
      summary: Rate a photo (1-5 stars)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingInput"
      responses:
        "200":
          description: Updated photo with new average rating
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
    delete:
      operationId: clearPhotoRating
      tags: [ratings]
      summary: Clear the current user's rating on a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated photo with rating removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
        "404":
          description: Photo not found

  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List all tags
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
    post:
      operationId: createTag
      tags: [tags]
      summary: Create a new tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagInput"
      responses:
        "201":
          description: Created tag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "401":
          description: Unauthorized

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
