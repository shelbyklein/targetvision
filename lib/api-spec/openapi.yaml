openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Team Photo Album API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: albums
    description: Album operations
  - name: photos
    description: Photo operations
  - name: tags
    description: Tag operations
  - name: categories
    description: Category operations
  - name: ratings
    description: Rating operations
  - name: stats
    description: Aggregation and statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update a user's role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /albums:
    get:
      operationId: listAlbums
      tags: [albums]
      summary: List all albums
      responses:
        "200":
          description: List of albums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Album"
    post:
      operationId: createAlbum
      tags: [albums]
      summary: Create a new album
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumInput"
      responses:
        "201":
          description: Created album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "401":
          description: Unauthorized

  /albums/{id}:
    get:
      operationId: getAlbum
      tags: [albums]
      summary: Get a single album by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Album details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "404":
          description: Not found
    patch:
      operationId: updateAlbum
      tags: [albums]
      summary: Update an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumUpdate"
      responses:
        "200":
          description: Updated album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteAlbum
      tags: [albums]
      summary: Delete an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /albums/{id}/top-rated:
    get:
      operationId: getAlbumTopRated
      tags: [photos]
      summary: Get top-rated photos in an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Top-rated photos in this album
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /albums/{id}/cover:
    patch:
      operationId: setAlbumCover
      tags: [albums]
      summary: Set the cover photo for an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumCoverUpdate"
      responses:
        "200":
          description: Updated album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /albums/{id}/photos:
    get:
      operationId: listAlbumPhotos
      tags: [photos]
      summary: List photos in an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of photos in album
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
    post:
      operationId: uploadPhoto
      tags: [photos]
      summary: Add a photo to an album (URL-based)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUploadInput"
      responses:
        "201":
          description: Created photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
        "404":
          description: Album not found

  /photos:
    get:
      operationId: listPhotos
      tags: [photos]
      summary: List all photos
      responses:
        "200":
          description: List of photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"

  /photos/{id}:
    get:
      operationId: getPhoto
      tags: [photos]
      summary: Get a single photo by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photo details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "404":
          description: Not found
    patch:
      operationId: updatePhoto
      tags: [photos]
      summary: Update photo metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUpdate"
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    delete:
      operationId: deletePhoto
      tags: [photos]
      summary: Delete a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /photos/{id}/tags:
    post:
      operationId: addPhotoTag
      tags: [tags]
      summary: Add a tag to a photo (creates tag if needed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoTagInput"
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos/{id}/tags/{tagId}:
    delete:
      operationId: removePhotoTag
      tags: [tags]
      summary: Remove a tag from a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: tagId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos/{id}/categories:
    post:
      operationId: addPhotoCategory
      tags: [categories]
      summary: Add a category to a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoCategoryInput"
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos/{id}/categories/{categoryId}:
    delete:
      operationId: removePhotoCategory
      tags: [categories]
      summary: Remove a category from a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /photos/{id}/rating:
    post:
      operationId: ratePhoto
      tags: [ratings]
      summary: Rate a photo (1-5 stars)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingInput"
      responses:
        "200":
          description: Updated photo with new average rating
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
        "403":
          description: Cannot rate own photo

  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List all tags
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
    post:
      operationId: createTag
      tags: [tags]
      summary: Create a new tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagInput"
      responses:
        "201":
          description: Created tag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "401":
          description: Unauthorized

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized

  /stats/recent-photos:
    get:
      operationId: getRecentPhotos
      tags: [stats]
      summary: Get recently uploaded photos across all albums
      responses:
        "200":
          description: Recent photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /stats/top-rated:
    get:
      operationId: getTopRatedPhotos
      tags: [stats]
      summary: Get top-rated photos across all albums
      responses:
        "200":
          description: Top rated photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /stats/tag-cloud:
    get:
      operationId: getTagCloud
      tags: [stats]
      summary: Get tag usage counts for tag cloud display
      responses:
        "200":
          description: Tag cloud data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TagCount"
        "401":
          description: Unauthorized

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      required: [id, clerkId, name, email, role, createdAt]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, member]
        createdAt:
          type: string
          format: date-time

    UserRoleUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, member]

    Album:
      type: object
      required: [id, ownerId, title, createdAt, photoCount]
      properties:
        id:
          type: integer
        ownerId:
          type: integer
        ownerName:
          type: ["string", "null"]
        title:
          type: string
        description:
          type: ["string", "null"]
        eventDate:
          type: ["string", "null"]
        coverPhotoId:
          type: ["integer", "null"]
        coverPhotoUrl:
          type: ["string", "null"]
        photoCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    AlbumInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        eventDate:
          type: string

    AlbumUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        eventDate:
          type: ["string", "null"]

    AlbumCoverUpdate:
      type: object
      required: [photoId]
      properties:
        photoId:
          type: integer

    Photo:
      type: object
      required: [id, albumId, uploaderId, url, createdAt, ratingCount]
      properties:
        id:
          type: integer
        albumId:
          type: integer
        albumTitle:
          type: ["string", "null"]
        uploaderId:
          type: integer
        uploaderName:
          type: ["string", "null"]
        storageKey:
          type: ["string", "null"]
        url:
          type: string
        caption:
          type: ["string", "null"]
        takenAt:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        averageRating:
          type: ["number", "null"]
        ratingCount:
          type: integer
        myRating:
          type: ["integer", "null"]
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"

    PhotoUpdate:
      type: object
      properties:
        caption:
          type: string
        takenAt:
          type: ["string", "null"]

    PhotoUploadInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
          minLength: 1
        caption:
          type: string
        storageKey:
          type: string
        takenAt:
          type: string

    PhotoTagInput:
      type: object
      required: [tagName]
      properties:
        tagName:
          type: string
          minLength: 1

    PhotoCategoryInput:
      type: object
      required: [categoryId]
      properties:
        categoryId:
          type: integer

    Tag:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    TagInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    TagCount:
      type: object
      required: [id, name, count]
      properties:
        id:
          type: integer
        name:
          type: string
        count:
          type: integer

    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    RatingInput:
      type: object
      required: [score]
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 5

    DashboardStats:
      type: object
      required: [totalAlbums, totalPhotos, totalUsers, totalTags, recentActivity]
      properties:
        totalAlbums:
          type: integer
        totalPhotos:
          type: integer
        totalUsers:
          type: integer
        totalTags:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/Photo"
