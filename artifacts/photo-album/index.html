<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Vispix — collaborative marketing photo selection</title>
    <meta name="description" content="Vispix (vispix.dev) is a collaborative workspace for teams to choose photos for marketing. Browse event albums, rate shortlist candidates, and shortlist the right shots together." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Vispix — collaborative marketing photo selection" />
    <meta property="og:description" content="Vispix (vispix.dev) is a collaborative workspace for teams to choose photos for marketing. Browse event albums, rate shortlist candidates, and shortlist the right shots together." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vispix — collaborative marketing photo selection" />
    <meta name="twitter:description" content="Vispix (vispix.dev) is a collaborative workspace for teams to choose photos for marketing. Browse event albums, rate shortlist candidates, and shortlist the right shots together." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var isDark = stored ? stored === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", isDark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
