packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

allowBuilds:
  '@google/genai': true
  '@prisma/client': false
  better-sqlite3: false
  esbuild: true
  protobufjs: true
  sharp: true

autoInstallPeers: false

catalog:
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': 25.3.5
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  vite: ^7.3.2
  wouter: ^3.3.5
  zod: 3.25.76

# Windows: run lifecycle/package scripts through Git Bash (repo scripts use POSIX syntax)
scriptShell: C:\Program Files\Git\bin\bash.exe

minimumReleaseAge: 1440

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - sharp
  - unrs-resolver

overrides:
  '@esbuild-kit/esm-loader': npm:tsx@^4.21.0
  esbuild: 0.27.3
  react: 19.1.0
  react-dom: 19.1.0
  # Force a single @types/react across the workspace. Without this, mobile pins
  # ~19.1.x while photo-album/catalog resolve ^19.2.x, producing two copies of
  # @types/react whose structurally-identical-but-distinct types break the
  # photo-album typecheck (calendar.tsx/spinner.tsx). Pinned to 19.1.x to match
  # the react 19.1.0 runtime and Expo/React-Native's @types/react requirement.
  '@types/react': 19.1.10
  '@types/react-dom': 19.1.7
